<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Amit Weds Kirti</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #fff5e6, #ffe6cc);
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .card {
      max-width: 500px;
      margin: auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      padding: 15px;
    }

    img {
      width: 100%;
      border-radius: 15px;
    }

    h1 {
      color: #b35900;
      margin-top: 20px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 25px;
      font-size: 18px;
      color: white;
      background: linear-gradient(45deg, #ff6600, #cc3300);
      border: none;
      border-radius: 30px;
      text-decoration: none;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      background: linear-gradient(45deg, #cc3300, #ff6600);
    }

    /* Popup */
    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .popup-content {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
    }

    .popup button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #ff6600;
      color: white;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<!-- Language Popup -->
<div id="popup" class="popup">
  <div class="popup-content">
    <h2>Select Language / भाषा निवडा</h2>
    <button onclick="setLanguage('en')">English</button>
    <button onclick="setLanguage('mr')">मराठी</button>
  </div>
</div>

<div class="container hidden" id="mainContent">
  <div class="card">
    <!-- Replace this path if needed -->
    <img src="Amit_wedding_invitation_card.jpeg" alt="Wedding Invitation">

    <h1 id="title"></h1>

    <a 
      href="https://maps.app.goo.gl/6v3DxCXcDvzR2pAF9" 
      target="_blank" 
      class="btn"
      id="mapBtn"
    >
    </a>
  </div>
</div>

<script>
  function setLanguage(lang) {
    document.getElementById("popup").style.display = "none";
    document.getElementById("mainContent").classList.remove("hidden");

    if (lang === 'en') {
      document.getElementById("title").innerText = "Amit Weds Kirti 💍";
      document.getElementById("mapBtn").innerText = "📍 View Amit's Wedding Location";
    } else {
      document.getElementById("title").innerText = "अमित आणि कीर्ती 💍";
      document.getElementById("mapBtn").innerText = "📍 अमितच्या लग्नाचे ठिकाण पहा";
    }
  }
</script>

</body>
</html>
