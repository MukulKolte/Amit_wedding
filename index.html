<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title style="">Amit Weds Kirti</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to right, #fff5e6, #ffe6cc);
  scroll-behavior: smooth;
}

/* Navbar */
.navbar {
  position: sticky;
  top: 0;
  background: #b35900;
  padding: 10px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  z-index: 1000;
}

.navbar a, .navbar button {
  color: white;
  text-decoration: none;
  font-weight: bold;
  padding: 5px 10px;
  background: transparent;
  border: none;
  cursor: pointer;
}

/* Layout */
.container {
  padding: 20px;
  text-align: center;
}

.card {
  max-width: 500px;
  margin: auto;
  background: white;
  border-radius: 20px;
  padding: 20px;
}

/* Sections */
.section {
  margin-top: 40px;
  text-align: center;
}

/* Event Cards */
.sub-section {
  max-width: 500px;
  margin: 20px auto;
  padding: 20px;
  background: linear-gradient(135deg, #fff8f0, #ffe6cc);
  border-radius: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  position: relative;
}

.sub-section:hover {
  transform: scale(1.1);
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

.sub-section b {
  font-size: 20px;
  color: #b35900;
}

.sub-section span {
  display: block;
  margin-top: 10px;
  font-weight: bold;
  color: #cc3300;
}


/* Buttons */
.btn {
  display: inline-block;
  margin-top: 20px;
  margin-left: 10px;
  padding: 12px 20px;
  font-size: 16px;
  color: white;
  /* background: linear-gradient(45deg, #ff6600, #cc3300); */
  background: #61affe;
  border-radius: 30px;
  text-decoration: none;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  border: none;
  outline: none;
  cursor: pointer;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

/* Instruction text */
.location-text {
  color: #b35900;
  font-weight: bold;
  font-size: 12px;
  margin-top: 15px;
}

#title {
  font-family: 'Playfair Display', serif;
  font-size: 55px;
  text-align: center;
  color: #800000;
  letter-spacing: 2px;
}

#eventsTitle {
  font-family: 'Alex Brush', cursive;
  font-size: 48px;
  text-align: center;
  color: #d4af37;
  text-shadow: 0 0 10px rgba(212,175,55,0.6),
               0 0 20px rgba(212,175,55,0.3);
  margin: 50px 0;
}

/* Popup */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
}

.popup-content {
  background: white;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
}

.popup button {
  margin: 10px;
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: #ff6600;
  color: white;
  cursor: pointer;
}

/* 💎 PREMIUM Welcome Popup (FIXED) */
.welcome-popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: linear-gradient(45deg, #b35900, #ff6600);
  color: white;
  padding: 20px 30px;
  border-radius: 20px;
  font-size: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  z-index: 2000;
  text-align: center;
  animation: popupFade 3s ease forwards;
}

/* Smooth premium animation */
@keyframes popupFade {
  0% {
    opacity: 0;
    transform: translate(-50%, -70%) scale(0.9);
  }
  10% {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  90% {
    opacity: 1;
  }
  100% {
    opacity: 0;
    transform: translate(-50%, -70%) scale(0.9);
  }
}

.hidden { display: none; }
</style>
</head>

<body>

<!-- Welcome Popup -->
<div id="welcomePopup" class="welcome-popup hidden">
  <p id="welcomeText"></p>
</div>

<!-- Music -->
<audio id="bgMusic" autoplay loop muted>
  <source src="wedding-music.mp3" type="audio/mpeg">
</audio>

<!-- Language Popup -->
<div id="popup" class="popup">
  <div class="popup-content">
    <h2>Select Language / भाषा निवडा</h2>
    <button onclick="setLanguage('en')">English</button>
    <button onclick="setLanguage('mr')">मराठी</button>
  </div>
</div>

<!-- Navbar -->
<div id="navbar" class="navbar hidden">
  <a href="#events" id="navEvents"></a>
  <a href="#engagement" id="navEng"></a>
  <a href="#haladi" id="navHaladi"></a>
  <a href="#wedding" id="navWedding"></a>
  <a href="#contacts" id="navContact"></a>

  <!-- Toggle moved here -->
  <button onclick="toggleLang()" id="toggleBtn"></button>
</div>

<div class="container hidden" id="mainContent">

<div class="card">

<img id="inviteImg" src="Amit_wedding_invitation_card.jpeg" style="width:100%; border-radius:15px;">

<h1 id="title"></h1>

<p class="location-text" id="locationText"></p>

<a href="https://maps.app.goo.gl/4vidZrXgnBan2KW19" target="_blank" class="btn" id="mapBtn"></a>

</div>

<!-- Events -->
<div id="events" class="section">
  <h2 id="eventsTitle"></h2>

  <div id="engagement" class="sub-section"></div><br>
  <div id="haladi" class="sub-section"></div><br>
  <div id="wedding" class="sub-section"></div>
</div>

<!-- Contacts -->
<div id="contacts" class="section">
  <h2 id="contactTitle"></h2>
  <p>📞 8862050557</p>
  <p>📞 9822973770</p>
</div>

</div>

<script>
let lang = '';

function startCountdown(id, eventDate) {
  function update() {
    const now = new Date().getTime();
    const dist = eventDate - now;

    if (dist < 0) {
      document.getElementById(id).innerText = "Started 🎉";
      return;
    }

    const d = Math.floor(dist / (1000*60*60*24));
    const h = Math.floor((dist/(1000*60*60))%24);
    const m = Math.floor((dist/(1000*60))%60);
    const s = Math.floor((dist/1000)%60);

    document.getElementById(id).innerText =
      d+"d "+h+"h "+m+"m "+s+"s";
  }

  update();
  setInterval(update,1000);
}

function showWelcomeMessage() {
  const popup = document.getElementById("welcomePopup");
  const text = document.getElementById("welcomeText");

  text.innerText = (lang === 'en')
    ? "Hello!! A warm welcome from the Pardeshi family...!!!!"
    : "नमस्कार!! परदेशी परिवाराकडून तुमचं सहर्ष स्वागत आहे ...!!!!";

  popup.classList.remove("hidden");

  setTimeout(() => {
    popup.classList.add("hidden");
  }, 3000);
}

function setLanguage(l) {
  lang = l;
  document.getElementById("popup").style.display = "none";
  document.getElementById("mainContent").classList.remove("hidden");
  document.getElementById("navbar").classList.remove("hidden");

  let music = document.getElementById("bgMusic");
  music.muted = false;
  music.play();

  showWelcomeMessage();
  updateContent();
}

function toggleLang() {
  lang = lang === 'en' ? 'mr' : 'en';
  showWelcomeMessage();
  updateContent();
}

function updateContent() {

if (lang === 'en') {

  document.getElementById("title").innerText = "Amit 卐 Kirti";
  document.getElementById("mapBtn").innerText = "📍 Event Location";
  document.getElementById("toggleBtn").innerText = "मराठीत बघा";
  document.getElementById("locationText").innerText = "👇🏻 Click below button to see event location";
  document.getElementById("inviteImg").src = "Amit_wedding_invitation_card.jpeg";

  document.getElementById("eventsTitle").innerText = "Events";
  document.getElementById("contactTitle").innerText = "Contacts";

  document.getElementById("navEvents").innerText = "Events";
  document.getElementById("navEng").innerText = "Engagement";
  document.getElementById("navHaladi").innerText = "Haladi";
  document.getElementById("navWedding").innerText = "Wedding";
  document.getElementById("navContact").innerText = "Contacts";

  document.getElementById("engagement").innerHTML =
    "💍 <b>Engagement Ceremony</b><br>Saturday, 25th April 2026, 04:00 PM<br>⏳ <span id='engTimer'></span>";

  document.getElementById("haladi").innerHTML =
    "🌼 <b>Haladi Ceremony</b><br>Saturday, 25th April 2026, 07:00 PM<br>⏳ <span id='halTimer'></span>";

  document.getElementById("wedding").innerHTML =
  "<img src='Kalash.png' style='width:20px; vertical-align:middle;'> <b>Wedding Ceremony</b><br>Sunday, 26th April 2026, 12:37 PM<br>⏳ <span id='wedTimer'></span>";

} else {

  document.getElementById("title").innerText = "अमित 卐 किर्ती";
  document.getElementById("mapBtn").innerText = "📍 विवाहस्थळ";
  document.getElementById("toggleBtn").innerText = "View in English";
  document.getElementById("locationText").innerText = "👇🏻 खालील बटणावर क्लिक करून कार्यक्रमाचे ठिकाण पहा";
  document.getElementById("inviteImg").src = "Amit_wedding_invitation_card_marathi.jpeg";

  document.getElementById("eventsTitle").innerText = "कार्यक्रम";
  document.getElementById("contactTitle").innerText = "संपर्क";

  document.getElementById("navEvents").innerText = "कार्यक्रम";
  document.getElementById("navEng").innerText = "साखरपुडा";
  document.getElementById("navHaladi").innerText = "हळदी";
  document.getElementById("navWedding").innerText = "विवाह";
  document.getElementById("navContact").innerText = "संपर्क";

 document.getElementById("engagement").innerHTML =
  "💍 <b>साखरपुडा समारंभ</b><br>शनिवार, 25 एप्रिल 2026<br>दुपारी 04.00 वाजता<br>⏳ <span id='engTimer'></span>";

document.getElementById("haladi").innerHTML =
  "🌼 <b>हळदी समारंभ</b><br>शनिवार, 25 एप्रिल 2026<br>सायंकाळी 07.00 वाजता<br>⏳ <span id='halTimer'></span>";

document.getElementById("wedding").innerHTML =
  "<img src='Kalash.png' style='width:20px; vertical-align:middle; margin-bottom:5px;'> <b>विवाह मुहूर्त</b><br>रविवार, 26 एप्रिल 2026<br>दुपारी 12.37 वाजता<br>⏳ <span id='wedTimer'></span>";
}

startCountdown("engTimer", new Date(2026,3,25,16,0).getTime());
startCountdown("halTimer", new Date(2026,3,25,19,0).getTime());
startCountdown("wedTimer", new Date(2026,3,26,12,37).getTime());

}
</script>

</body>
</html>
